# Datasource: aponta para o Postgres dedicado a testes definido em docker-compose.test.yml.
# Antes de rodar testes de integração, suba o container:
#   docker compose -f docker-compose.test.yml up -d
spring.datasource.url=jdbc:postgresql://localhost:5433/movapp_test
spring.datasource.username=test
spring.datasource.password=test
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway é a fonte da verdade do schema; valida apenas, sem ddl-auto.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Secrets de teste — não usados pelos cenários de integração mas precisam estar
# definidos porque application.properties referencia ${ADMIN_PASSWORD} etc.
jwt.secret=test-secret-com-pelo-menos-256-bits-de-comprimento-para-jjwt-aceitar-2026
jwt.expiration=86400000
app.admin.username=admin
app.admin.password=test-admin
app.user.username=usuario
app.user.password=test-user

logging.level.com.loja.movapp=INFO
logging.level.org.hibernate.SQL=WARN
